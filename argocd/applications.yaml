apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecom-microservices
  namespace: argocd
spec:
  description: E-Commerce Microservices Project
  sourceRepos:
    - 'https://github.com/YOUR_GITHUB_OWNER/ecom-microservices.git'
  destinations:
    - namespace: ecom-microservices-staging
      server: https://kubernetes.default.svc
    - namespace: ecom-microservices-prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'networking.k8s.io'
      kind: Ingress
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
  roles:
    - name: pipeline-deployer
      policies:
        - p, proj:ecom-microservices:pipeline-deployer, applications, sync, ecom-microservices/*, allow
        - p, proj:ecom-microservices:pipeline-deployer, applications, get, ecom-microservices/*, allow

---
# ─── API Gateway - Staging ────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecom-microservices-staging-api-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecom-microservices
  source:
    repoURL: https://github.com/YOUR_GITHUB_OWNER/ecom-microservices.git
    targetRevision: main
    path: helm/api-gateway
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecom-microservices-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5

---
# ─── API Gateway - Prod ───────────────────────────────────────────────────────
