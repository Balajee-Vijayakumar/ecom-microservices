apiVersion: v1
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: analytics-service
    name: analytics-service
    namespace: ecom-microservices-prod
  spec:
    progressDeadlineSeconds: 600
    replicas: 3
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: analytics-service
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        creationTimestamp: null
        labels:
          app: analytics-service
      spec:
        containers:
        - env:
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                key: host
                name: db-credentials
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                key: username
                name: db-credentials
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: db-credentials
          - name: PGSSLMODE
            value: require
          - name: SERVICE_NAME
            value: analytics-service
          - name: AWS_DEFAULT_REGION
            value: us-east-2
          envFrom:
          - secretRef:
              name: app-secrets
          image: 451124812411.dkr.ecr.us-east-2.amazonaws.com/ecom-microservices/analytics-service:latest
          imagePullPolicy: Always
          name: analytics-service
          ports:
          - containerPort: 8001
            protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        imagePullSecrets:
        - name: ecr-credentials
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
