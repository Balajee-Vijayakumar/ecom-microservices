  data:
    API_GATEWAY_URL: http://a87b7113d190d498aaf09439c7b820a0-1204413475.us-east-2.elb.amazonaws.com
    ENVIRONMENT: prod
    FRONTEND_URL: http://a8f87ce24d1fd4a5c805ebe402acf5ae-1464707177.us-east-2.elb.amazonaws.com
  kind: ConfigMap
  metadata:
