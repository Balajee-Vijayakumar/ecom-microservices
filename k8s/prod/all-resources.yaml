- apiVersion: v1
  data:
    default.conf: "server {\n  listen 80;\n  charset utf-8;\n  location / {\n    root\
      \ /usr/share/nginx/html;\n    index index.html;\n    try_files $uri $uri/ /index.html;\n\
      \  }\n  location /health {\n    return 200 'ok';\n    add_header Content-Type\
      \ text/plain;\n  }\n}"
    index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"\
      >\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
      >\n<title>NEXUS STORE — Premium Electronics</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap\"\
      \ rel=\"stylesheet\">\n<style>\n  :root {\n    --bg: #0a0a0f;\n    --bg2: #111118;\n\
      \    --bg3: #1a1a24;\n    --card: #14141e;\n    --border: rgba(255,255,255,0.07);\n\
      \    --accent: #6366f1;\n    --accent2: #a855f7;\n    --accent3: #22d3ee;\n\
      \    --text: #f0f0f8;\n    --muted: #6b7280;\n    --green: #10b981;\n    --red:\
      \ #ef4444;\n    --yellow: #f59e0b;\n  }\n  * { margin:0; padding:0; box-sizing:border-box;\
      \ }\n  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;\
      \ min-height:100vh; overflow-x:hidden; }\n\n  /* ── NOISE TEXTURE OVERLAY ──\
      \ */\n  body::before {\n    content:''; position:fixed; inset:0; pointer-events:none;\
      \ z-index:0;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0\
      \ 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence\
      \ type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect\
      \ width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E\"\
      );\n    opacity: 0.4;\n  }\n\n  /* ── GLOW ORBS ── */\n  .orb { position:fixed;\
      \ border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:0.15;\
      \ }\n  .orb1 { width:600px; height:600px; background:var(--accent); top:-200px;\
      \ right:-100px; }\n  .orb2 { width:400px; height:400px; background:var(--accent2);\
      \ bottom:-100px; left:-100px; }\n\n  /* ── NAV ── */\n  nav {\n    position:sticky;\
      \ top:0; z-index:100;\n    background:rgba(10,10,15,0.85); backdrop-filter:blur(20px);\n\
      \    border-bottom:1px solid var(--border);\n    padding:0 2rem; display:flex;\
      \ align-items:center; gap:2rem; height:64px;\n  }\n  .nav-logo { font-family:'Syne',sans-serif;\
      \ font-weight:800; font-size:1.3rem; letter-spacing:-0.02em; background:linear-gradient(135deg,var(--accent),var(--accent2));\
      \ -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer;\
      \ }\n  .nav-links { display:flex; gap:0.25rem; flex:1; }\n  .nav-link { padding:0.5rem\
      \ 1rem; border-radius:8px; cursor:pointer; font-size:0.9rem; color:var(--muted);\
      \ transition:all 0.2s; border:none; background:none; font-family:inherit; }\n\
      \  .nav-link:hover, .nav-link.active { color:var(--text); background:var(--bg3);\
      \ }\n  .nav-right { display:flex; align-items:center; gap:1rem; margin-left:auto;\
      \ }\n  .cart-btn {\n    position:relative; padding:0.5rem 1.25rem; border-radius:10px;\n\
      \    background:var(--bg3); border:1px solid var(--border);\n    color:var(--text);\
      \ cursor:pointer; font-family:inherit; font-size:0.9rem;\n    display:flex;\
      \ align-items:center; gap:0.5rem; transition:all 0.2s;\n  }\n  .cart-btn:hover\
      \ { border-color:var(--accent); color:var(--accent); }\n  .cart-count {\n  \
      \  position:absolute; top:-6px; right:-6px;\n    background:var(--accent); color:white;\
