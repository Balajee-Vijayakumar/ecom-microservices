- apiVersion: apps/v1
  kind: StatefulSet
  metadata:
    name: rabbitmq
    namespace: ecom-microservices-prod
  spec:
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    podManagementPolicy: OrderedReady
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: rabbitmq
    serviceName: rabbitmq
    template:
      metadata:
        creationTimestamp: null
        labels:
          app: rabbitmq
      spec:
        containers:
        - env:
          - name: RABBITMQ_DEFAULT_USER
            value: admin
          - name: RABBITMQ_DEFAULT_PASS
            valueFrom:
              secretKeyRef:
                key: rabbitmq-password
                name: app-secrets
          image: rabbitmq:3.12-management
          imagePullPolicy: IfNotPresent
          name: rabbitmq
          ports:
          - containerPort: 5672
            protocol: TCP
          - containerPort: 15672
            protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
    updateStrategy:
      rollingUpdate:
        partition: 0
      type: RollingUpdate
- apiVersion: v1
  data:
    server.js: "const http = require('http');\nconst os = require('os');\nconst server\
      \ = http.createServer((req, res) => {\n  res.setHeader('Content-Type', 'application/json');\n\
      \  res.setHeader('Access-Control-Allow-Origin', '*');\n  if (req.url === '/health')\
      \ {\n    res.writeHead(200);\n    res.end(JSON.stringify({status:'ok'}));\n\
      \  } else if (req.url === '/api/status') {\n    res.writeHead(200);\n    res.end(JSON.stringify({\n\
      \      status:'online', service:'api-gateway',\n      cluster:'ecom-microservices-prod',\
      \ version:'1.31',\n      timestamp: new Date().toISOString(),\n      services:['user-service','order-service','product-service','analytics-service','notification-service']\n\
      \    }));\n  } else {\n    res.writeHead(200);\n    res.end(JSON.stringify({message:'API\
      \ Gateway Online', path: req.url}));\n  }\n});\nserver.listen(3000, () => console.log('API\
      \ Gateway listening on port 3000'));\n"
  kind: ConfigMap
  metadata:
    name: api-gateway-script
    namespace: ecom-microservices-prod
