# helm/user-service/values-prod.yaml
replicaCount: 3
image:
  repository: AWS_ACCOUNT_ID.dkr.ecr.us-east-2.amazonaws.com/ecom-microservices/user-service
  tag: "latest"
  pullPolicy: Always
service:
  type: ClusterIP
  port: 3001
  targetPort: 3001
ingress:
  enabled: false
env:
  PORT: "3001"
  NODE_ENV: production
  PROJECT_NAME: ecom-microservices
  ENVIRONMENT: prod
  AWS_REGION: us-east-2
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
podDisruptionBudget:
  enabled: true
  minAvailable: 2
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values: [user-service]
        topologyKey: kubernetes.io/hostname
livenessProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 20
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
