# helm/api-gateway/values-prod.yaml
replicaCount: 3

image:
  repository: AWS_ACCOUNT_ID.dkr.ecr.us-east-2.amazonaws.com/ecom-microservices/api-gateway
  tag: "latest"   # Updated automatically by CodePipeline
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  host: api.ecom.example.com

env:
  PORT: "3000"
  NODE_ENV: production
  USER_SERVICE_URL: http://user-service.ecom-microservices-prod.svc.cluster.local:3001
  ORDER_SERVICE_URL: http://order-service.ecom-microservices-prod.svc.cluster.local:3002
  PRODUCT_SERVICE_URL: http://product-service.ecom-microservices-prod.svc.cluster.local:8000
  ANALYTICS_SERVICE_URL: http://analytics-service.ecom-microservices-prod.svc.cluster.local:8001

secrets:
  jwtSecretArn: arn:aws:secretsmanager:us-east-2:AWS_ACCOUNT_ID:secret:ecom-microservices/prod/app/jwt-secret

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - api-gateway
        topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
